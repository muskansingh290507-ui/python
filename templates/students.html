<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Student Details</h2>

<table>
    <tr>
        <th>Email</th>
        <th>Name</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.email }}</td>
        <td>{{ student.name }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
